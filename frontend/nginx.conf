server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # POST (and other non-GET) requests to SPA paths should be proxied to the
    # backend by Traefik before reaching this container.  If they arrive here
    # anyway (e.g. while the backend is starting up), serve the SPA so the
    # browser gets a meaningful response rather than a 405 error page.
    error_page 405 =200 /index.html;
}
