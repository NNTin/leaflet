name: "Copilot Setup Steps"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://leaflet:leaflet@127.0.0.1:5432/leaflet
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: leaflet
      PGPASSWORD: leaflet
      PGDATABASE: leaflet
      SESSION_SECRET: copilot-setup-session-secret
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Install and configure PostgreSQL
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-client

          # Start the default PostgreSQL cluster on the runner.
          PG_MAJOR="$(psql --version | awk '{print $3}' | cut -d. -f1)"
          if sudo pg_ctlcluster --skip-systemctl-redirect "$PG_MAJOR" main start; then
            echo "Started PostgreSQL via pg_ctlcluster ($PG_MAJOR/main)."
          else
            sudo service postgresql start
          fi

          for i in {1..20}; do
            if sudo -u postgres pg_isready -h 127.0.0.1 -p 5432 >/dev/null 2>&1; then
              echo "PostgreSQL service is accepting connections."
              break
            fi
            echo "Waiting for PostgreSQL service startup... ($i/20)"
            sleep 1
          done

          sudo -u postgres pg_isready -h 127.0.0.1 -p 5432

          sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'leaflet') THEN
              CREATE ROLE leaflet LOGIN PASSWORD 'leaflet';
            ELSE
              ALTER ROLE leaflet WITH LOGIN PASSWORD 'leaflet';
            END IF;
          END
          $$;
          SQL

          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname = 'leaflet'" | grep -q 1; then
            sudo -u postgres createdb -O leaflet leaflet
          fi

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL to become ready
        run: |
          PGHOST="${PGHOST:-127.0.0.1}"
          PGPORT="${PGPORT:-5432}"
          PGUSER="${PGUSER:-leaflet}"
          PGPASSWORD="${PGPASSWORD:-leaflet}"
          PGDATABASE="${PGDATABASE:-leaflet}"
          export PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE

          for i in {1..30}; do
            if psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1;" >/dev/null 2>&1; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: Run backend migrations
        working-directory: backend
        run: |
          set -euo pipefail
          PGHOST="${PGHOST:-127.0.0.1}"
          PGPORT="${PGPORT:-5432}"
          PGUSER="${PGUSER:-leaflet}"
          PGPASSWORD="${PGPASSWORD:-leaflet}"
          PGDATABASE="${PGDATABASE:-leaflet}"
          export PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE

          shopt -s nullglob
          migration_files=(migrations/*.sql)

          if [ "${#migration_files[@]}" -eq 0 ]; then
            echo "No backend migration files found."
            exit 1
          fi

          for file in "${migration_files[@]}"; do
            echo "Applying $file"
            psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Build frontend
        run: npm --workspace frontend run build

      - name: Build backend
        run: npm --workspace backend run build

      - name: Build CLI
        run: npm --workspace cli run build

      - name: CLI sanity check
        run: node cli/dist/index.js --help

      - name: Health check 1 - Node and npm versions
        id: health_node_versions
        continue-on-error: true
        run: |
          node --version
          npm --version

      - name: Health check 2 - Lockfile and workspace integrity
        id: health_lockfile_integrity
        continue-on-error: true
        run: npm ci --dry-run

      - name: Health check 3 - PostgreSQL connectivity
        id: health_postgres_connectivity
        continue-on-error: true
        run: |
          PGHOST="${PGHOST:-127.0.0.1}"
          PGPORT="${PGPORT:-5432}"
          PGUSER="${PGUSER:-leaflet}"
          PGPASSWORD="${PGPASSWORD:-leaflet}"
          PGDATABASE="${PGDATABASE:-leaflet}"
          export PGHOST PGPORT PGUSER PGPASSWORD PGDATABASE
          psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -c "SELECT 1;"

      - name: Health check 4 - Backend smoke test
        id: health_backend_smoke
        continue-on-error: true
        run: |
          export DATABASE_URL="${DATABASE_URL:-postgresql://leaflet:leaflet@127.0.0.1:5432/leaflet}"
          export SESSION_SECRET="${SESSION_SECRET:-copilot-setup-session-secret}"
          export FRONTEND_URL="${FRONTEND_URL:-http://localhost:5173}"

          node backend/dist/server.js >/tmp/leaflet-backend.log 2>&1 &
          BACKEND_PID=$!
          cleanup() {
            if kill -0 "$BACKEND_PID" 2>/dev/null; then
              kill "$BACKEND_PID"
              wait "$BACKEND_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for i in {1..20}; do
            if curl -fsS http://localhost:3001/auth/csrf-token >/dev/null; then
              echo "Backend smoke check passed."
              exit 0
            fi
            sleep 1
          done

          cat /tmp/leaflet-backend.log
          echo "Backend smoke check failed."
          exit 1

      - name: Health check summary and final status
        if: always()
        run: |
          failures=0

          report() {
            local name="$1"
            local outcome="$2"
            if [ "$outcome" = "success" ]; then
              echo "PASS: $name"
            else
              echo "FAIL: $name ($outcome)"
              failures=$((failures + 1))
            fi
          }

          report "Node and npm versions" "${{ steps.health_node_versions.outcome }}"
          report "Lockfile and workspace integrity" "${{ steps.health_lockfile_integrity.outcome }}"
          report "PostgreSQL connectivity" "${{ steps.health_postgres_connectivity.outcome }}"
          report "Backend smoke test" "${{ steps.health_backend_smoke.outcome }}"

          if [ "$failures" -gt 0 ]; then
            echo "One or more health checks failed."
            exit 1
          fi

          echo "All health checks passed."
