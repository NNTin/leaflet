openapi: 3.0.3
info:
  title: Leaflet URL Shortener API
  description: Privacy-first URL shortener backend API
  version: 1.0.0

servers:
  - url: http://localhost:3001
    description: Configured API server

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: connect.sid
    BearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 access token or legacy API key

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [user, privileged, admin]
        created_at:
          type: string
          format: date-time

    ShortUrl:
      type: object
      properties:
        id:
          type: integer
        shortCode:
          type: string
        originalUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isCustom:
          type: boolean
        createdBy:
          type: string
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: string

    OAuthError:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds until the access token expires
        refresh_token:
          type: string
        scope:
          type: string

    OAuthClient:
      type: object
      properties:
        clientId:
          type: string
        clientSecret:
          type: string
          nullable: true
          description: Raw secret shown only at registration time; null for public clients
        name:
          type: string
        isPublic:
          type: boolean
        redirectUris:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ConsentedApp:
      type: object
      properties:
        clientId:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        grantedAt:
          type: string
          format: date-time

paths:
  /auth/csrf-token:
    get:
      summary: Get a CSRF token for the current session
      tags: [Auth]
      responses:
        '200':
          description: CSRF token to include as X-CSRF-Token header in mutating requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string

  /auth/api-key:
    get:
      summary: Get or generate an API key for CLI/programmatic access
      description: Returns the current user's API key. Generates one if it does not exist yet. Use as a Bearer token for CLI requests.
      tags: [Auth]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: API key for the authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
        '401':
          description: Not authenticated

  /auth/github:
    get:
      summary: Initiate GitHub OAuth flow
      tags: [Auth]
      responses:
        '302':
          description: Redirects to GitHub OAuth

  /auth/github/callback:
    get:
      summary: GitHub OAuth callback
      tags: [Auth]
      responses:
        '302':
          description: Redirects to frontend after authentication

  /auth/me:
    get:
      summary: Get current authenticated user
      tags: [Auth]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Current user or null if not authenticated
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/User'
                  - type: 'null'

  /auth/logout:
    post:
      summary: Log out current session
      tags: [Auth]
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /oauth/authorize:
    get:
      summary: OAuth 2.0 Authorization endpoint
      description: |
        Presents a consent screen to the authenticated user.
        Requires the user to be logged in via a browser session (GitHub OAuth).
        Public clients must include a PKCE code_challenge.
      tags: [OAuth]
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          required: true
          schema:
            type: string
            description: Space-separated list of requested scopes
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: code_challenge
          in: query
          required: false
          schema:
            type: string
            description: Base64url-encoded SHA-256 of the code_verifier (required for public clients)
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [S256]
      responses:
        '200':
          description: HTML consent page
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to redirect_uri with code or error
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/token:
    post:
      summary: OAuth 2.0 Token endpoint
      description: |
        Exchanges an authorization code for tokens, or refreshes tokens.
        Uses application/x-www-form-urlencoded request body.
        No CSRF token required.
      tags: [OAuth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                client_id:
                  type: string
                client_secret:
                  type: string
                  description: Required for confidential clients
                code:
                  type: string
                  description: Required for authorization_code grant
                redirect_uri:
                  type: string
                  description: Required for authorization_code grant; must match original
                code_verifier:
                  type: string
                  description: PKCE verifier; required when code_challenge was used
                refresh_token:
                  type: string
                  description: Required for refresh_token grant
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request or grant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '401':
          description: Invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth/revoke:
    post:
      summary: OAuth 2.0 Token Revocation endpoint (RFC 7009)
      description: |
        Revokes an access or refresh token. Always returns 200.
        Uses application/x-www-form-urlencoded request body.
      tags: [OAuth]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, client_id]
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        '200':
          description: Revocation acknowledged (regardless of whether the token existed)

  /oauth/apps:
    get:
      summary: List apps the authenticated user has authorized
      tags: [OAuth]
      security:
        - sessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          description: List of consented applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConsentedApp'
        '401':
          description: Authentication required
    post:
      summary: Register a new OAuth client application
      tags: [OAuth]
      security:
        - sessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, redirectUris, scopes, isPublic]
              properties:
                name:
                  type: string
                redirectUris:
                  type: array
                  items:
                    type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [shorten:create, shorten:create:never, shorten:create:alias,
                           urls:read, urls:delete, user:read, admin:*]
                isPublic:
                  type: boolean
      responses:
        '201':
          description: Client registered; clientSecret is shown only once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthClient'
        '400':
          description: Validation error
        '401':
          description: Authentication required

  /oauth/apps/{clientId}:
    delete:
      summary: Revoke an OAuth client and all its active tokens
      description: Owner or admin only.
      tags: [OAuth]
      security:
        - sessionCookie: []
        - BearerAuth: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application revoked
        '401':
          description: Authentication required
        '403':
          description: Forbidden
        '404':
          description: Client not found

  /api/shorten:
    post:
      summary: Create a short URL
      tags: [URLs]
      security:
        - sessionCookie: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, ttl]
              properties:
                url:
                  type: string
                  format: uri
                  description: The URL to shorten
                ttl:
                  type: string
                  enum: [5m, 1h, 24h, never]
                  description: Time-to-live. "never" is admin only.
                alias:
                  type: string
                  minLength: 3
                  maxLength: 50
                  description: Custom short code alias. Privileged/admin only.
      responses:
        '201':
          description: Short URL created
          content:
            application/json:
              schema:
                type: object
                properties:
                  shortCode:
                    type: string
                  shortUrl:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                    nullable: true
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Alias already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded (anonymous users)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/{code}:
    get:
      summary: Redirect to original URL
      tags: [URLs]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Temporary redirect to the original URL
        '404':
          description: Short URL not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /s/{code}:
    get:
      summary: Canonical short-link redirect
      tags: [URLs]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Temporary redirect to the original URL
        '404':
          description: Short URL not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/urls:
    get:
      summary: List all URLs (admin only)
      tags: [URLs]
      security:
        - sessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          description: List of all short URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShortUrl'
        '401':
          description: Unauthorized
        '403':
          description: Admin access required

  /api/urls/{id}:
    delete:
      summary: Delete a URL (admin only)
      tags: [URLs]
      security:
        - sessionCookie: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: URL deleted
        '401':
          description: Unauthorized
        '403':
          description: Admin access required
        '404':
          description: URL not found

  /admin/users:
    get:
      summary: List all users (admin only)
      tags: [Admin]
      security:
        - sessionCookie: []
        - BearerAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Admin access required

  /admin/users/{id}/role:
    patch:
      summary: Update a user's role (admin only)
      tags: [Admin]
      security:
        - sessionCookie: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [user, privileged]
      responses:
        '200':
          description: Updated user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Admin access required
        '404':
          description: User not found

  /admin/urls/{id}:
    delete:
      summary: Delete any URL (admin only)
      tags: [Admin]
      security:
        - sessionCookie: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: URL deleted
        '401':
          description: Unauthorized
        '403':
          description: Admin access required
        '404':
          description: URL not found
